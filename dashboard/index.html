<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>SDD · dashboard</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/vendor/marked.min.js" defer></script>
  <!-- Mermaid is large (3.3 MB); loaded lazily on the first artifact that
       actually contains a ```mermaid block (see app.js renderMermaidIn). -->
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">▍SDD</span>
      <span class="sub" id="project">—</span>
    </div>
    <div class="topbar-right">
      <button id="roadmap-btn" class="ghost" title="Repo roadmap">roadmap</button>
      <span class="conn" id="conn"><span class="dot" id="conn-dot"></span><span id="conn-text">connecting…</span></span>
      <span class="session" id="session"></span>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <span>features</span>
        <button id="new-feature" class="ghost small" title="Create a new feature (runs /sdd:specify)">+ new</button>
      </div>
      <ul id="feature-list" class="feature-list"></ul>
    </aside>

    <main class="main" id="main">
      <div class="empty" id="empty-state">
        <p>Select a feature on the left, or <button id="new-feature-2" class="link">create one</button>.</p>
        <p class="muted">The dashboard mirrors <code>docs/features/</code> on disk and drives the SDD pipeline back into your live Claude session.</p>
      </div>

      <section class="feature-view hidden" id="feature-view">
        <div class="feature-header">
          <div>
            <h1 id="f-title">—</h1>
            <div class="badges" id="f-badges"></div>
          </div>
          <div class="feature-actions">
            <button id="run-next" class="run primary" title="Run the next pending stage in the live session">▶ Run next stage</button>
          </div>
        </div>

        <div class="stepper" id="stepper"></div>

        <div class="run-status hidden" id="run-status"></div>

        <div class="artifact-area">
          <div class="artifact-tabs" id="artifact-tabs"></div>
          <div class="artifact-toolbar hidden" id="artifact-toolbar">
            <span class="artifact-path" id="artifact-path"></span>
            <span class="spacer"></span>
          </div>
          <div class="artifact-viewer" id="artifact-viewer"></div>
        </div>
      </section>
    </main>

    <aside class="console" id="console-pane">
      <div class="console-head">
        <span>session activity</span>
        <button id="clear-console" class="ghost small">clear</button>
      </div>
      <div class="console-log" id="console-log"></div>
    </aside>
  </div>

  <div class="modal hidden" id="modal">
    <div class="modal-box">
      <h2 id="modal-title">Create feature</h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
